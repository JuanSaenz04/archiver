name: Docker Images

on:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-scan-publish:
    name: Build, scan, and publish ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: Api.Dockerfile
            local_image: archiver-api
          - name: worker
            dockerfile: Worker.Dockerfile
            local_image: archiver-worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare image names
        id: image
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo}-${{ matrix.image.name }}"
          sha_tag="${image}:${GITHUB_SHA}"
          local_tag="${{ matrix.image.local_image }}:${GITHUB_SHA}"

          {
            echo "image=${image}"
            echo "sha_tag=${sha_tag}"
            echo "local_tag=${local_tag}"
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              echo "scan_ref=${local_tag}"
            else
              echo "scan_ref=${sha_tag}"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=sha,prefix=,format=long
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=archiver-${{ matrix.image.name }}
            org.opencontainers.image.licenses=AGPL-3.0-only

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for pull request scan
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.image.dockerfile }}
          load: true
          push: false
          tags: ${{ steps.image.outputs.local_tag }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

      - name: Build and publish image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

      - name: Run Trivy vulnerability scan (JSON)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.scan_ref }}
          format: json
          output: trivy-${{ matrix.image.name }}.json
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Convert Trivy report formats
        shell: bash
        run: |
          trivy convert --format sarif --output trivy-${{ matrix.image.name }}.sarif trivy-${{ matrix.image.name }}.json
          trivy convert --format table --output trivy-${{ matrix.image.name }}.txt trivy-${{ matrix.image.name }}.json

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v6
        with:
          name: trivy-${{ matrix.image.name }}
          path: |
            trivy-${{ matrix.image.name }}.json
            trivy-${{ matrix.image.name }}.sarif
            trivy-${{ matrix.image.name }}.txt
          if-no-files-found: error

      - name: Upload Trivy SARIF to GitHub code scanning
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}
